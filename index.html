<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Roleta Premium</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700;800&display=swap" rel="stylesheet" />
    <style>
:root {
  color-scheme: dark;
}
* { box-sizing: border-box; }
body {
  margin: 0;
  font-family: "Sora", system-ui, sans-serif;
  color: #f8fafc;
}
.app-bg {
  min-height: 100vh;
  background-image: url("./bg.png");
  background-size: cover;
  background-position: top center;
  background-repeat: no-repeat;
}
@media (max-width: 640px) {
  .app-bg { background-size: contain; }
}
.app-overlay {
  min-height: 100vh;
  background: linear-gradient(180deg, rgba(8, 8, 12, 0.25) 0%, rgba(8, 8, 12, 0.45) 60%, rgba(8, 8, 12, 0.7) 100%);
}
.container { max-width: 540px; margin: 0 auto; padding: 24px 16px 80px; }
.hero-cover {
  height: 220px; border-radius: 24px; border: 1px solid rgba(239, 68, 68, 0.35);
  background-image: url("./cover.webp"), url("./bg.png"); background-size: cover; background-position: center right;
  box-shadow: 0 20px 50px rgba(0, 0, 0, 0.45);
}
@media (min-width: 768px) { .hero-cover { height: 260px; } }
.title { text-align: center; margin-top: 12px; text-transform: uppercase; letter-spacing: 0.4em; font-size: 12px; color: #fde68a; }
.floating { position: fixed; right: 18px; top: 90px; display: flex; flex-direction: column; gap: 10px; z-index: 20; }
.floating-btn { width: 48px; height: 48px; border-radius: 999px; background: rgba(30, 9, 12, 0.85); border: 2px solid rgba(255, 118, 118, 0.6); color: #f8fafc; font-size: 11px; font-weight: 600; text-transform: uppercase; }
.stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-top: 16px; }
.pill { padding: 12px 14px; border-radius: 16px; background: rgba(20, 10, 12, 0.85); border: 2px solid rgba(255, 118, 118, 0.5); box-shadow: 0 12px 24px rgba(0,0,0,0.4); text-align: center; color: #f8fafc; font-weight: 600; }
.pill span { display: block; font-size: 11px; color: #fde68a; }
.wheel-area { margin-top: 48px; display: flex; flex-direction: column; align-items: center; gap: 12px; }
.wheel-wrapper { position: relative; }
.pointer { position: absolute; top: -80px; left: 50%; transform: translateX(-50%); width: 300px; z-index: 20; }
.wheel-frame { padding: 10px; border-radius: 999px; background: radial-gradient(circle at center, rgba(255, 210, 120, 0.45), rgba(255, 210, 120, 0) 55%), conic-gradient(from 0deg, #fbd38d, #f59e0b, #d97706, #f59e0b, #fbd38d); box-shadow: 0 16px 40px rgba(0,0,0,0.45); }
.wheel-inner { position: relative; width: 320px; height: 320px; border-radius: 999px; border: 6px solid rgba(255, 200, 120, 0.6); background-color: #2b0b0b; overflow: hidden; transition: transform 4.2s cubic-bezier(0.17, 0.67, 0.2, 0.99); }
@media (min-width: 768px) { .wheel-inner { width: 360px; height: 360px; } }
.wheel-slice { position: absolute; inset: 0; background-size: 130% 130%; background-repeat: no-repeat; filter: saturate(1.1) contrast(1.05); }
.reward-text { position: absolute; left: 50%; top: 50%; transform-origin: 0% 0%; width: 120px; text-align: center; font-size: 11px; font-weight: 800; text-transform: uppercase; color: #ffe7b2; background: rgba(10, 6, 8, 0.55); padding: 4px 6px; border-radius: 8px; text-shadow: 0 2px 6px rgba(0,0,0,0.7); z-index: 6; }
.wheel-center { position: absolute; inset: 0; margin: auto; width: 64px; height: 64px; border-radius: 999px; background: linear-gradient(180deg, #fef08a, #f59e0b); border: 2px solid rgba(255, 200, 120, 0.8); box-shadow: 0 8px 24px rgba(0,0,0,0.5); }
.result { min-height: 24px; padding: 6px 12px; border-radius: 999px; background: rgba(0,0,0,0.6); font-size: 13px; }
.spin-area { margin-top: 16px; display: flex; justify-content: center; }
.spin-lip { background: radial-gradient(circle at top, #ff3b3b, #b31111 70%); border: 3px solid rgba(255, 180, 180, 0.8); box-shadow: 0 8px 24px rgba(0,0,0,0.45), inset 0 2px 6px rgba(255,255,255,0.2); color: #fff; padding: 12px 28px; border-radius: 999px; font-size: 16px; font-weight: 700; text-transform: uppercase; cursor: pointer; }
.prize-list { margin-top: 18px; display: grid; grid-template-columns: repeat(2, 1fr); gap: 14px; }
.prize-card { background: rgba(0,0,0,0.55); border-radius: 14px; padding: 10px; text-align: center; }
.prize-card img { width: 160px; height: 160px; object-fit: cover; border-radius: 12px; }
.prize-card span { display: block; margin-top: 8px; color: #fef3c7; font-size: 13px; }
.modal { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: grid; place-items: center; padding: 24px; z-index: 50; }
.modal.hidden { display: none; }
.modal-card { width: min(520px, 100%); background: #0f172a; border-radius: 20px; padding: 20px; border: 1px solid rgba(148, 163, 184, 0.4); }
.modal-header { display: flex; justify-content: space-between; align-items: center; }
.modal-header h3 { margin: 0; }
.link { background: transparent; border: none; color: #94a3b8; cursor: pointer; }
.form { display: grid; gap: 10px; margin-top: 12px; }
label { display: grid; gap: 6px; font-size: 13px; }
input, textarea { width: 100%; padding: 10px; border-radius: 10px; border: 1px solid rgba(148, 163, 184, 0.4); background: rgba(15, 23, 42, 0.7); color: #f8fafc; }
.label { margin-top: 12px; font-weight: 600; color: #fde68a; }
.plans { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
.plan-btn { padding: 10px; border-radius: 12px; border: 1px solid rgba(251, 191, 36, 0.4); background: rgba(30, 41, 59, 0.7); color: #f8fafc; font-weight: 600; cursor: pointer; }
.plan-btn.active { background: #fbbf24; color: #0f172a; }
.summary { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 10px; color: #fef3c7; font-size: 13px; }
.actions { margin-top: 14px; display: grid; gap: 10px; }
.primary { padding: 12px; border-radius: 12px; background: linear-gradient(135deg, #ef4444, #b91c1c); border: none; color: white; font-weight: 700; cursor: pointer; }
.pix { margin-top: 14px; border-top: 1px solid rgba(148, 163, 184, 0.3); padding-top: 12px; }
.pix-content { display: grid; grid-template-columns: 160px 1fr; gap: 12px; }
.pix img { width: 160px; height: 160px; object-fit: contain; background: #0b1222; padding: 8px; border-radius: 12px; }
#copyPix { margin-top: 8px; padding: 10px; border-radius: 10px; background: #fbbf24; border: none; font-weight: 700; cursor: pointer; }
.note { margin-top: 8px; color: #fde68a; font-size: 12px; }
.error { margin-top: 10px; background: rgba(248,113,113,0.2); color: #fecaca; padding: 8px 10px; border-radius: 10px; }
.win-card { width: min(360px, 100%); background: linear-gradient(160deg, rgba(25, 12, 14, 0.95), rgba(8, 8, 12, 0.95)); border-radius: 20px; border: 2px solid rgba(255, 180, 120, 0.5); padding: 24px; text-align: center; z-index: 2; }
.win-title { text-transform: uppercase; letter-spacing: 0.3em; color: #fde68a; font-size: 12px; }
.win-card img { width: 180px; height: 180px; object-fit: cover; border-radius: 14px; margin: 16px auto 0; display: block; }
.confetti { position: absolute; inset: 0; pointer-events: none; overflow: hidden; }
.confetti span { position: absolute; top: -10%; left: calc(4% * var(--i)); width: 10px; height: 18px; background: linear-gradient(180deg, #ffd166, #ef476f); opacity: 0.9; animation: confetti-fall 2.2s ease-in-out infinite; animation-delay: calc(0.05s * var(--i)); }
.confetti span:nth-child(3n) { background: linear-gradient(180deg, #06d6a0, #118ab2); }
.confetti span:nth-child(4n) { background: linear-gradient(180deg, #ffd166, #f3722c); }
@keyframes confetti-fall { 0% { transform: translateY(-20vh) rotate(0deg); } 100% { transform: translateY(120vh) rotate(360deg); } }
.hidden { display: none !important; }
.asset-warning {
  margin: 14px 0 18px;
  padding: 12px 14px;
  border-radius: 12px;
  background: rgba(248, 113, 113, 0.18);
  border: 1px solid rgba(248, 113, 113, 0.5);
  color: #fecaca;
  font-size: 13px;
  line-height: 1.4;
}

</style>
  </head>
  <body>
    <div class="app-bg">
      <div class="app-overlay">
        <div class="container">
          <section class="hero-cover"></section>

          <div class="title">
            <p>Roleta Premium</p>
          </div>

          <div class="floating">
            <button class="floating-btn">Perfil</button>
            <button class="floating-btn">Som</button>
          </div>

          <div class="stats">
            <button id="openDeposit" class="pill">Depositar</button>
            <div class="pill">
              <span>Saldo</span>
              <strong id="balance">R$ 0,00</strong>
            </div>
            <div class="pill">
              <span>Giro</span>
              <strong>R$ 2,00</strong>
            </div>
          </div>

          <div class="wheel-area">
            <div class="wheel-wrapper">
              <img src="./pointer.webp" alt="Seta" class="pointer" />
              <div class="wheel-frame">
                <div id="wheel" class="wheel-inner"></div>
              </div>
              <div class="wheel-center"></div>
            </div>
            <div id="result" class="result"></div>
          </div>

          <div class="spin-area">
            <button id="spinButton" class="spin-lip">Girar sua roleta</button>
          </div>

          <div class="prize-list" id="prizeList"></div>
        </div>
      </div>
    </div>

    <div id="depositModal" class="modal hidden">
      <div class="modal-card">
        <div class="modal-header">
          <h3>Depositar via PIX</h3>
          <button id="closeDeposit" class="link">Fechar</button>
        </div>
        <div class="form">
          <label>Nome<input id="name" type="text" value="Visitante" /></label>
          <label>E-mail<input id="email" type="email" placeholder="seu@email.com" /></label>
          <label>CPF<input id="cpf" type="text" placeholder="Somente números" /></label>
          <label>Telefone (WhatsApp)<input id="phone" type="text" placeholder="DDD + número" /></label>
        </div>
        <p class="label">Escolha o valor</p>
        <div class="plans" id="plans"></div>
        <div class="summary">
          <span>Selecionado: R$ <strong id="selectedAmount">10</strong></span>
          <span>Bônus: R$ <strong id="selectedBonus">0</strong></span>
          <span>Total crédito: R$ <strong id="selectedTotal">10</strong></span>
        </div>
        <div class="actions">
          <button id="generate" class="primary">Gerar QR Code</button>
        </div>
        <section id="pixResult" class="pix hidden" style="display:none">
          <h4>PIX gerado</h4>
          <div class="pix-content">
            <img id="qrImage" alt="QR Code" />
            <div>
              <textarea id="qrText" rows="4" readonly></textarea>
              <button id="copyPix">Copiar código PIX</button>
            </div>
          </div>
          <p class="note">Após pagar, me chame no WhatsApp e eu libero o acesso.</p>
        </section>
        <div id="error" class="error hidden"></div>
      </div>
    </div>

    <div id="winModal" class="modal hidden">
      <div class="confetti" id="confetti"></div>
      <div class="win-card">
        <p class="win-title">Parabéns!</p>
        <h3 id="winLabel"></h3>
        <img id="winImage" alt="Prêmio" />
        <button id="closeWin" class="primary">Fechar</button>
      </div>
    </div>

    <script>
const API_URL = (() => {
  const params = new URLSearchParams(window.location.search);
  const api = params.get('api');
  if (api) return api.replace(/\/+$/, '');
  if (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1') {
    return 'http://localhost:4000';
  }
  return 'https://roletadabb8-0-s7ro.vercel.app';
})();
const rewards = [
  { id: 1, label: "Prêmio 1", img: "./premio-1.png", weight: 40 },
  { id: 2, label: "Prêmio 2", img: "./premio-2.png", weight: 25 },
  { id: 3, label: "Prêmio 3", img: "./premio-3.png", weight: 12 },
  { id: 4, label: "Prêmio 4", img: "./premio-4.png", weight: 2 },
  { id: 5, label: "Prêmio 5", img: "./premio-5.png", weight: 2 },
  { id: 6, label: "Prêmio 6", img: "./premio-6.png", weight: 10 },
  { id: 7, label: "Prêmio 7", img: "./premio-7.png", weight: 7 },
  { id: 8, label: "Prêmio 8", img: "./premio-8.png", weight: 2 },
];

const SPIN_COST = 2;
let balance = 0;

const wheel = document.getElementById("wheel");
const prizeList = document.getElementById("prizeList");
const result = document.getElementById("result");
const spinButton = document.getElementById("spinButton");
const winModal = document.getElementById("winModal");
const winLabel = document.getElementById("winLabel");
const winImage = document.getElementById("winImage");
const closeWin = document.getElementById("closeWin");
const confetti = document.getElementById("confetti");
const balanceEl = document.getElementById("balance");
const pointerImg = document.querySelector(".pointer");
if (pointerImg) {
  pointerImg.onerror = () => {
    pointerImg.style.display = "none";
  };
}

const openDeposit = document.getElementById("openDeposit");
const depositModal = document.getElementById("depositModal");
const closeDeposit = document.getElementById("closeDeposit");

const generateBtn = document.getElementById("generate");
const plansContainer = document.getElementById("plans");
const selectedAmount = document.getElementById("selectedAmount");
const selectedBonus = document.getElementById("selectedBonus");
const selectedTotal = document.getElementById("selectedTotal");
const pixResult = document.getElementById("pixResult");
const qrImage = document.getElementById("qrImage");
const qrText = document.getElementById("qrText");
const copyBtn = document.getElementById("copyPix");
const errorBox = document.getElementById("error");

const bonusMap = { 10: 0, 30: 10, 50: 30, 100: 50 };
const planValues = [10, 30, 50, 100];
let currentAmount = 10;
let rotation = 0;
let spinning = false;
let assetWarningEl = null;

function setBalance(value) {
  balance = value;
  if (balanceEl) {
    balanceEl.textContent = `R$ ${balance.toFixed(2)}`.replace(".", ",");
  }
}

setBalance(0);

function showAssetWarning(missing) {
  if (!missing.length) return;
  if (!assetWarningEl) {
    assetWarningEl = document.createElement("div");
    assetWarningEl.className = "asset-warning";
    const container = document.querySelector(".container");
    if (container) {
      container.insertBefore(assetWarningEl, container.firstChild);
    }
  }
  assetWarningEl.textContent =
    "Algumas imagens não foram encontradas: " +
    missing.join(", ") +
    ". Envie todos os arquivos para a raiz do site.";
}

function checkAssets() {
  const assets = [
    { name: "bg.png", src: "./bg.png" },
    { name: "cover.webp", src: "./cover.webp" },
    { name: "pointer.webp", src: "./pointer.webp" },
    { name: "premio-1.png", src: "./premio-1.png" },
    { name: "premio-2.png", src: "./premio-2.png" },
    { name: "premio-3.png", src: "./premio-3.png" },
    { name: "premio-4.png", src: "./premio-4.png" },
    { name: "premio-5.png", src: "./premio-5.png" },
    { name: "premio-6.png", src: "./premio-6.png" },
    { name: "premio-7.png", src: "./premio-7.png" },
    { name: "premio-8.png", src: "./premio-8.png" },
  ];
  const missing = new Set();
  let pending = assets.length;
  assets.forEach((asset) => {
    const img = new Image();
    img.onload = () => {
      pending -= 1;
      if (pending === 0) showAssetWarning([...missing]);
    };
    img.onerror = () => {
      missing.add(asset.name);
      pending -= 1;
      if (pending === 0) showAssetWarning([...missing]);
    };
    const bust = `?v=${Date.now()}`;
    img.src = `${asset.src}${bust}`;
  });
}

function validateCustomer(customer) {
  if (!customer.name || !customer.email || !customer.document || !customer.phone) {
    return "Preencha nome, e-mail, CPF e telefone.";
  }
  return "";
}

function setAmount(amount) {
  currentAmount = amount;
  const bonus = bonusMap[amount] || 0;
  selectedAmount.textContent = amount.toFixed(0);
  selectedBonus.textContent = bonus.toFixed(0);
  selectedTotal.textContent = (amount + bonus).toFixed(0);
  document.querySelectorAll(".plan-btn").forEach((btn) => {
    btn.classList.toggle("active", Number(btn.dataset.amount) === amount);
  });
}

function buildPlans() {
  plansContainer.innerHTML = "";
  planValues.forEach((value) => {
    const btn = document.createElement("button");
    btn.className = "plan-btn";
    btn.dataset.amount = value;
    btn.textContent = `R$ ${value}${bonusMap[value] ? ` (+ R$ ${bonusMap[value]} bônus)` : ""}`;
    btn.addEventListener("click", () => setAmount(value));
    plansContainer.appendChild(btn);
  });
  setAmount(currentAmount);
}

function sliceClip(startDeg, endDeg) {
  const toPoint = (deg) => {
    const rad = ((deg - 90) * Math.PI) / 180;
    const x = 50 + 50 * Math.cos(rad);
    const y = 50 + 50 * Math.sin(rad);
    return `${x}% ${y}%`;
  };
  return `polygon(50% 50%, ${toPoint(startDeg)}, ${toPoint(endDeg)})`;
}

function sliceBgPosition(midDeg) {
  const rad = ((midDeg - 90) * Math.PI) / 180;
  const x = 50 + 22 * Math.cos(rad);
  const y = 50 + 22 * Math.sin(rad);
  return `${x}% ${y}%`;
}

function buildWheel() {
  const segments = rewards.length;
  const segmentAngle = 360 / segments;
  const colors = ["#4c1d1d", "#5b1f1f", "#3b0f0f", "#5f1a1a"];
  const gradientStops = rewards.map((_, idx) => {
    const start = idx * segmentAngle;
    const end = start + segmentAngle;
    const color = colors[idx % colors.length];
    return `${color} ${start}deg ${end}deg`;
  });
  wheel.style.backgroundImage = `conic-gradient(${gradientStops.join(",")}), repeating-conic-gradient(from 0deg, transparent 0deg, transparent calc(${segmentAngle}deg - 2deg), rgba(255, 215, 128, 0.9) calc(${segmentAngle}deg - 2deg), rgba(255, 215, 128, 0.9) ${segmentAngle}deg)`;

  rewards.forEach((reward, idx) => {
    const start = idx * segmentAngle;
    const end = start + segmentAngle;
    const mid = start + segmentAngle / 2;

    const slice = document.createElement("div");
    slice.className = "wheel-slice";
    slice.style.clipPath = sliceClip(start, end);
    slice.style.backgroundImage = `linear-gradient(180deg, rgba(0,0,0,0.15) 0%, rgba(0,0,0,0.45) 80%), url(${reward.img})`;
    slice.style.backgroundPosition = sliceBgPosition(mid);

    const text = document.createElement("div");
    text.className = "reward-text";
    text.style.transform = `rotate(${mid}deg) translate(0, -145px) rotate(90deg)`;
    text.textContent = reward.label;

    wheel.appendChild(slice);
    wheel.appendChild(text);
  });
}

function buildPrizeList() {
  prizeList.innerHTML = "";
  rewards.forEach((reward, idx) => {
    const card = document.createElement("div");
    card.className = "prize-card";
    const label = document.createElement("div");
    label.className = "label";
    label.textContent = `#${idx + 1}`;

    const img = document.createElement("img");
    img.src = reward.img;
    img.alt = reward.label;
    img.onerror = () => {
      img.style.display = "none";
    };

    const title = document.createElement("span");
    title.textContent = reward.label;

    card.appendChild(label);
    card.appendChild(img);
    card.appendChild(title);
    prizeList.appendChild(card);
  });
}

function pickReward() {
  const total = rewards.reduce((sum, r) => sum + r.weight, 0);
  let roll = Math.random() * total;
  for (const reward of rewards) {
    roll -= reward.weight;
    if (roll <= 0) return reward;
  }
  return rewards[0];
}

function spin() {
  if (spinning) return;

  if (balance < SPIN_COST) {
    result.textContent = "Saldo insuficiente";
    return;
  }

  spinning = true;
  balance -= SPIN_COST;
  setBalance(balance);

  const reward = pickReward();
  const segments = rewards.length;
  const segmentAngle = 360 / segments;
  const index = rewards.findIndex((r) => r.id === reward.id);
  const targetAngle = 360 - (index * segmentAngle + segmentAngle / 2);
  rotation += 360 * 3 + targetAngle;

  wheel.style.transform = `rotate(${rotation}deg)`;
  result.textContent = "";

  setTimeout(() => {
    spinning = false;
    result.textContent = `Resultado: ${reward.label}`;
    winLabel.textContent = reward.label;
    winImage.src = reward.img;
    openWin();
  }, 4200);
}

function openWin() {
  confetti.innerHTML = "";
  for (let i = 0; i < 24; i += 1) {
    const span = document.createElement("span");
    span.style.setProperty("--i", i);
    confetti.appendChild(span);
  }
  winModal.classList.remove("hidden");
}

function closeWinModal() {
  winModal.classList.add("hidden");
}

async function generatePix() {
  errorBox.classList.add("hidden");
  pixResult.classList.add("hidden");
  pixResult.style.display = "none";

  const payload = {
    amount: currentAmount,
    customer: {
      name: document.getElementById("name").value.trim() || "Visitante",
      email: document.getElementById("email").value.trim(),
      document: document.getElementById("cpf").value.trim(),
      phone: document.getElementById("phone").value.trim(),
    },
  };

  const validationError = validateCustomer(payload.customer);
  if (validationError) {
    errorBox.textContent = validationError;
    errorBox.classList.remove("hidden");
    return;
  }

  try {
    const endpoint = API_URL ? `${API_URL}/api/payments/deposit` : "/api/payments/deposit";
    const res = await fetch(endpoint, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload),
    });
    const text = await res.text();
    let data = {};
    try {
      data = text ? JSON.parse(text) : {};
    } catch {
      data = {};
    }

    if (!res.ok) {
      const detail = data.detail ? `: ${data.detail}` : "";
      const errMsg = data.error ? `${data.error}${detail}` : (text || `Erro ${res.status}`);
      throw new Error(errMsg);
    }

    qrImage.src = data.qrCode || "";
    qrText.value = data.qrCodeText || "";
    pixResult.classList.remove("hidden");
    pixResult.style.display = "block";
  } catch (err) {
    const msg = err && err.message ? err.message : "Erro ao gerar PIX";
    if (/failed to fetch/i.test(msg)) {
      errorBox.textContent = "Servidor de pagamento indisponível. Verifique a URL da API.";
    } else {
      errorBox.textContent = msg;
    }
    errorBox.classList.remove("hidden");
  }
}

async function copyPix() {
  if (!qrText.value) return;
  try {
    await navigator.clipboard.writeText(qrText.value);
    copyBtn.textContent = "Copiado!";
    setTimeout(() => (copyBtn.textContent = "Copiar código PIX"), 1500);
  } catch {
    copyBtn.textContent = "Não foi possível copiar";
    setTimeout(() => (copyBtn.textContent = "Copiar código PIX"), 1500);
  }
}

openDeposit.addEventListener("click", () => {
  depositModal.classList.remove("hidden");
  pixResult.classList.add("hidden");
  pixResult.style.display = "none";
  qrImage.src = "";
  qrText.value = "";
  errorBox.classList.add("hidden");
});
closeDeposit.addEventListener("click", () => depositModal.classList.add("hidden"));
spinButton.addEventListener("click", spin);
closeWin.addEventListener("click", closeWinModal);

buildPlans();
buildWheel();
buildPrizeList();
checkAssets();

generateBtn.addEventListener("click", generatePix);
copyBtn.addEventListener("click", copyPix);

</script>

</html>
